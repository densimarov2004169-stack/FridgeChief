<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FridgeChef — AI Meal Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,700;1,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #3d7a2e;
      --green-light: #6bb84f;
      --cream: #f5f0e8;
      --cream-dark: #ede5d4;
      --brown: #2c1f0e;
      --orange: #e05a1c;
      --text: #1a1208;
      --text-muted: #6b5a3e;
      --dark: #0f1a0f;
      --dark-mid: #1a2e1a;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: #e8f0e8;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(90,156,42,0.15);
      background: rgba(15,26,15,0.9);
      backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      font-family: 'Fraunces', serif;
      font-size: 1.3rem; font-weight: 700;
      color: #c8e6a0;
    }
    .logo span { color: var(--orange); }
    .nav-badge {
      font-size: 11px; background: rgba(90,156,42,0.2);
      border: 1px solid rgba(90,156,42,0.3);
      color: #7abf45; padding: 4px 12px; border-radius: 100px;
    }

    /* MAIN */
    .app { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* UPLOAD */
    .upload-zone {
      border: 2px dashed #3a5c3a; border-radius: 20px;
      padding: 2.5rem 2rem; text-align: center;
      cursor: pointer; transition: all 0.3s;
      background: rgba(26,46,26,0.5);
      margin-bottom: 1.5rem;
    }
    .upload-zone:hover, .upload-zone.drag { border-color: #7abf45; background: rgba(40,65,30,0.7); }
    .upload-zone.has-img { border-style: solid; border-color: #5a8c3a; }
    #preview { width: 100%; max-height: 260px; object-fit: cover; border-radius: 14px; display: none; margin-bottom: 1rem; }
    .upload-icon { font-size: 2.5rem; margin-bottom: 0.8rem; display: block; }
    .upload-zone h2 { font-size: 1.1rem; color: #c8e6a0; margin-bottom: 0.3rem; }
    .upload-zone p { font-size: 13px; color: #7a9c7a; }
    #file-in { display: none; }

    /* DIVIDER */
    .divider { text-align: center; color: #4a6c4a; font-size: 12px; margin: 1rem 0; position: relative; }
    .divider::before, .divider::after { content:''; position:absolute; top:50%; width:44%; height:1px; background:#2a3c2a; }
    .divider::before { left:0; } .divider::after { right:0; }

    /* TEXT INPUT */
    .text-box {
      background: rgba(20,35,20,0.8); border: 1px solid #2a4a2a;
      border-radius: 14px; padding: 1rem 1.2rem; margin-bottom: 1.5rem;
    }
    .text-box label { display:block; font-size:12px; color:#7a9c7a; margin-bottom:0.4rem; }
    .text-box textarea {
      width:100%; background:transparent; border:none; outline:none;
      color:#e8f0e8; font-family:'DM Sans',sans-serif; font-size:14px;
      resize:none; min-height:70px; line-height:1.6;
    }
    .text-box textarea::placeholder { color:#4a6a4a; }

    /* PREFS */
    .prefs { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.5rem; }
    .pref {
      background:rgba(20,35,20,0.8); border:1px solid #2a4a2a;
      border-radius:14px; padding:0.9rem 1rem;
    }
    .pref label { display:block; font-size:11px; color:#7a9c7a; margin-bottom:0.4rem; }
    .pref select {
      width:100%; background:transparent; border:none; outline:none;
      color:#e8f0e8; font-family:'DM Sans',sans-serif; font-size:14px; cursor:pointer;
    }
    .pref select option { background:#1a2e1a; }

    /* BUTTON */
    .go-btn {
      width:100%; background: linear-gradient(135deg,#5a9c2a,#7abf45);
      border:none; border-radius:14px; color:#0f1a0f;
      font-family:'DM Sans',sans-serif; font-size:16px; font-weight:500;
      padding:1rem; cursor:pointer; transition:all 0.25s;
    }
    .go-btn:hover { filter:brightness(1.1); transform:translateY(-2px); }
    .go-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

    /* LOADING */
    .loading { display:none; text-align:center; padding:3rem 1rem; }
    .loading.on { display:block; }
    .spinner {
      width:44px; height:44px; border:3px solid #2a4a2a;
      border-top-color:#7abf45; border-radius:50%;
      animation:spin 1s linear infinite; margin:0 auto 1rem;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading p { color:#7a9c7a; font-size:14px; }

    /* RESULTS */
    .results { display:none; }
    .results.on { display:block; }
    .results-top {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:1px solid #2a4a2a;
    }
    .results-top h2 { font-family:'Fraunces',serif; font-size:1.4rem; color:#c8e6a0; }
    .back-btn {
      background:transparent; border:1px solid #3a5c3a; border-radius:8px;
      color:#7a9c7a; font-family:'DM Sans',sans-serif; font-size:13px;
      padding:0.4rem 0.9rem; cursor:pointer; transition:all 0.2s;
    }
    .back-btn:hover { border-color:#7a9c7a; color:#c8e6a0; }

    /* INGREDIENTS */
    .ing-box {
      background:rgba(90,156,42,0.1); border:1px solid rgba(90,156,42,0.25);
      border-radius:12px; padding:1rem 1.2rem; margin-bottom:1.5rem;
    }
    .ing-box p { font-size:12px; color:#7abf45; font-weight:500; margin-bottom:0.5rem; }
    .tags { display:flex; flex-wrap:wrap; gap:6px; }
    .tag {
      background:rgba(90,156,42,0.15); border:1px solid rgba(90,156,42,0.2);
      border-radius:100px; padding:3px 10px; font-size:12px; color:#a0d060;
    }

    /* RECIPE CARD */
    .recipe {
      background:rgba(20,35,20,0.7); border:1px solid #2a4a2a;
      border-radius:18px; padding:1.5rem; margin-bottom:1rem;
      transition:border-color 0.2s;
    }
    .recipe:hover { border-color:#5a8c3a; }
    .recipe-head { display:flex; gap:1rem; align-items:flex-start; margin-bottom:1rem; }
    .recipe-emoji { font-size:2.2rem; }
    .recipe-info h3 { font-family:'Fraunces',serif; font-size:1.1rem; color:#c8e6a0; margin-bottom:0.3rem; }
    .recipe-meta { display:flex; gap:10px; flex-wrap:wrap; }
    .recipe-meta span { font-size:12px; color:#7a9c7a; }
    .diff {
      display:inline-block; font-size:11px; padding:2px 10px;
      border-radius:100px; font-weight:500;
    }
    .easy { background:rgba(90,156,42,0.2); color:#a0d060; }
    .medium { background:rgba(200,180,80,0.2); color:#c8b850; }
    .hard { background:rgba(200,80,80,0.2); color:#d07070; }
    .recipe-desc { font-size:14px; color:#9ab89a; line-height:1.6; margin-bottom:1rem; }
    .steps-wrap { display:none; border-top:1px solid #2a4a2a; padding-top:1rem; }
    .steps-wrap.open { display:block; }
    .steps-wrap h4 { font-size:12px; color:#7a9c7a; margin-bottom:0.8rem; font-weight:500; }
    .step { display:flex; gap:0.8rem; margin-bottom:0.7rem; align-items:flex-start; }
    .step-n {
      min-width:22px; height:22px; background:rgba(90,156,42,0.2);
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:11px; color:#7abf45; font-weight:500; flex-shrink:0; margin-top:2px;
    }
    .step p { font-size:13px; color:#9ab89a; line-height:1.5; }
    .toggle-btn {
      width:100%; background:transparent; border:1px solid #3a5c3a;
      border-radius:8px; color:#7abf45; font-family:'DM Sans',sans-serif;
      font-size:13px; padding:0.4rem; cursor:pointer; transition:all 0.2s;
    }
    .toggle-btn:hover { border-color:#7abf45; background:rgba(90,156,42,0.08); }

    /* ERROR */
    .err {
      background:rgba(180,60,60,0.1); border:1px solid rgba(180,60,60,0.3);
      border-radius:12px; padding:1rem 1.2rem; color:#d07070;
      font-size:14px; display:none; margin-top:1rem;
    }
    .err.on { display:block; }

    @media(max-width:480px) {
      .prefs { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">🥦 Fridge<span>Chef</span></div>
  <div class="nav-badge">Powered by Gemini AI</div>
</nav>

<div class="app">

  <div id="form-view">
    <!-- Upload -->
    <div class="upload-zone" id="zone" onclick="document.getElementById('file-in').click()">
      <img id="preview" src="" alt=""/>
      <span class="upload-icon" id="up-icon">📷</span>
      <h2 id="up-title">Snap your fridge</h2>
      <p id="up-sub">Tap to upload a photo, or drag & drop</p>
      <input type="file" id="file-in" accept="image/*"/>
    </div>

    <div class="divider">or describe your ingredients</div>

    <div class="text-box">
      <label>What ingredients do you have?</label>
      <textarea id="ing-text" placeholder="e.g. eggs, cheese, spinach, tomatoes, garlic, leftover rice..."></textarea>
    </div>

    <div class="prefs">
      <div class="pref">
        <label>Diet</label>
        <select id="diet">
          <option value="">No restrictions</option>
          <option value="vegetarian">Vegetarian</option>
          <option value="vegan">Vegan</option>
          <option value="gluten-free">Gluten-free</option>
          <option value="low-carb">Low carb</option>
          <option value="dairy-free">Dairy-free</option>
        </select>
      </div>
      <div class="pref">
        <label>Cooking time</label>
        <select id="time">
          <option value="">Any time</option>
          <option value="15 minutes">Under 15 min</option>
          <option value="30 minutes">Under 30 min</option>
          <option value="1 hour">Under 1 hour</option>
        </select>
      </div>
    </div>

    <button class="go-btn" id="go-btn" onclick="generate()">✨ Find my recipes</button>
    <div class="err" id="err-box"></div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p id="load-txt">Scanning your ingredients...</p>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="results-top">
      <h2>Your recipes</h2>
      <button class="back-btn" onclick="reset()">← New scan</button>
    </div>
    <div class="ing-box" id="ing-box"></div>
    <div id="recipe-list"></div>
  </div>

</div>

<script>
  // ── REPLACE THIS WITH YOUR NEW GEMINI API KEY ──
  const GEMINI_KEY = 'AIzaSyCd_BwT3iXUaFov55oyHcGJlUDY6qbSGEI';
  const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`;

  let imgB64 = null, imgMime = null;

  // File upload
  document.getElementById('file-in').addEventListener('change', e => {
    const f = e.target.files[0];
    if (f) loadImg(f);
  });

  const zone = document.getElementById('zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) loadImg(f);
  });

  function loadImg(f) {
    imgMime = f.type;
    const r = new FileReader();
    r.onload = ev => {
      imgB64 = ev.target.result.split(',')[1];
      const img = document.getElementById('preview');
      img.src = ev.target.result;
      img.style.display = 'block';
      document.getElementById('up-icon').style.display = 'none';
      document.getElementById('up-title').textContent = 'Photo loaded!';
      document.getElementById('up-sub').textContent = 'Tap to change';
      zone.classList.add('has-img');
    };
    r.readAsDataURL(f);
  }

  const loadMsgs = [
    'Scanning your ingredients...','Consulting the AI chef...','Finding perfect recipes...','Almost ready!'
  ];
  let loadInt;

  async function generate() {
    const text = document.getElementById('ing-text').value.trim();
    const diet = document.getElementById('diet').value;
    const time = document.getElementById('time').value;

    if (!imgB64 && !text) {
      showErr('Please upload a fridge photo or type your ingredients!');
      return;
    }

    hideErr();
    document.getElementById('form-view').style.display = 'none';
    const load = document.getElementById('loading');
    load.classList.add('on');

    let idx = 0;
    loadInt = setInterval(() => {
      idx = (idx + 1) % loadMsgs.length;
      document.getElementById('load-txt').textContent = loadMsgs[idx];
    }, 2000);

    const dietNote = diet ? `The user follows a ${diet} diet.` : '';
    const timeNote = time ? `All recipes must be ready in under ${time}.` : '';

    const prompt = `You are a creative chef AI. ${dietNote} ${timeNote}
Analyze the ingredients${imgB64 ? ' in the image' : ''} ${text ? 'and these additional ingredients: ' + text : ''} and suggest exactly 3 delicious recipes.

Respond ONLY with valid JSON, no markdown, no backticks, no explanation:
{
  "ingredients": ["ingredient1", "ingredient2"],
  "recipes": [
    {
      "emoji": "🍳",
      "name": "Recipe Name",
      "difficulty": "Easy",
      "time": "20 min",
      "servings": "2",
      "description": "A short appetizing description in one sentence.",
      "steps": ["Step 1", "Step 2", "Step 3", "Step 4"]
    }
  ]
}`;

    const parts = [{ text: prompt }];
    if (imgB64) {
      parts.push({ inline_data: { mime_type: imgMime, data: imgB64 } });
    }

    try {
      const res = await fetch(GEMINI_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts }] })
      });

      if (!res.ok) {
        const e = await res.json();
        throw new Error(e.error?.message || 'API error');
      }

      const data = await res.json();
      const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      const clean = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      clearInterval(loadInt);
      load.classList.remove('on');
      showResults(parsed);

    } catch(err) {
      clearInterval(loadInt);
      load.classList.remove('on');
      document.getElementById('form-view').style.display = 'block';
      showErr('Something went wrong: ' + err.message);
    }
  }

  function showResults(data) {
    // Ingredients
    const box = document.getElementById('ing-box');
    box.innerHTML = `<p>🔍 Detected ingredients</p><div class="tags">${
      (data.ingredients||[]).map(i=>`<span class="tag">${i}</span>`).join('')
    }</div>`;

    // Recipes
    const list = document.getElementById('recipe-list');
    list.innerHTML = '';
    (data.recipes||[]).forEach((r, i) => {
      const dc = (r.difficulty||'').toLowerCase();
      const diffCls = dc === 'easy' ? 'easy' : dc === 'hard' ? 'hard' : 'medium';
      const steps = (r.steps||[]).map((s,n)=>`
        <div class="step">
          <div class="step-n">${n+1}</div>
          <p>${s}</p>
        </div>`).join('');

      const card = document.createElement('div');
      card.className = 'recipe';
      card.innerHTML = `
        <div class="recipe-head">
          <div class="recipe-emoji">${r.emoji||'🍽️'}</div>
          <div class="recipe-info">
            <h3>${r.name}</h3>
            <div class="recipe-meta">
              <span class="diff ${diffCls}">${r.difficulty}</span>
              <span>⏱ ${r.time}</span>
              <span>👥 ${r.servings} servings</span>
            </div>
          </div>
        </div>
        <p class="recipe-desc">${r.description}</p>
        <div class="steps-wrap" id="sw-${i}">
          <h4>How to make it</h4>
          ${steps}
        </div>
        <button class="toggle-btn" id="tb-${i}" onclick="toggleSteps(${i})">
          Show step-by-step instructions ↓
        </button>`;
      list.appendChild(card);
    });

    document.getElementById('results').classList.add('on');
  }

  function toggleSteps(i) {
    const sw = document.getElementById(`sw-${i}`);
    const tb = document.getElementById(`tb-${i}`);
    const open = sw.classList.toggle('open');
    tb.textContent = open ? 'Hide instructions ↑' : 'Show step-by-step instructions ↓';
  }

  function reset() {
    document.getElementById('results').classList.remove('on');
    document.getElementById('form-view').style.display = 'block';
    document.getElementById('preview').style.display = 'none';
    document.getElementById('up-icon').style.display = 'block';
    document.getElementById('up-title').textContent = 'Snap your fridge';
    document.getElementById('up-sub').textContent = 'Tap to upload a photo, or drag & drop';
    document.getElementById('zone').classList.remove('has-img');
    document.getElementById('ing-text').value = '';
    imgB64 = null;
  }

  function showErr(m) {
    const b = document.getElementById('err-box');
    b.textContent = '⚠ ' + m;
    b.classList.add('on');
  }
  function hideErr() { document.getElementById('err-box').classList.remove('on'); }
</script>
</body>
</html>
